name: Good first issue
description: Suggest a small, well-scoped starter task.
title: "good first issue: "
labels: ["good first issue", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Good first issues should be independently testable and avoid public API breaks.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Examples
        - Documentation
        - Tests
        - CLI/generator
        - REST/RPC
        - Governance/observability
    validations:
      required: true
  - type: textarea
    id: task
    attributes:
      label: Task
      description: Describe the smallest useful change and the expected files.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: List the exact command that should pass after the change.
      placeholder: go test ./examples/...
    validations:
      required: true
