# Dependabot keeps direct dependencies fresh by opening
# automated bump PRs. Merging them keeps go.mod/go.sum tidy and
# surfaces security fixes early. Re-run weekly on Monday so the
# noise is bounded.

version: 2

updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    labels: [dependencies, go]
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      # Bump stable, low-risk libraries together to reduce noise.
      go-minor:
        dependency-type: production
        update-types: ["minor", "patch"]
      go-dev:
        dependency-type: development
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 3
    labels: [dependencies, docker]
    commit-message:
      prefix: chore
      include: scope
    groups:
      docker-base-images:
        patterns:
          - "*"
