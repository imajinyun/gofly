name: Examples

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - "examples/**"
      - "docs/**"
      - "bin/scripts/examples-smoke.sh"
      - "bin/scripts/check-doc-links.sh"
      - "Makefile"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  examples-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Build and smoke examples
        run: make examples-smoke

      - name: Validate local documentation links
        run: make docs-link-check
