version: "2"
run:
  tests: true
  timeout: 5m
  modules-download-mode: readonly
linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - unconvert
  settings:
    staticcheck:
      checks:
        - all
        - -QF1003
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - bodyclose
          - errcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/imajinyun/gofly
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
