# .goreleaser.yml — release automation for the gofly CLI.
#
# Trigger locally (snapshot, no publish):
#   make release-snapshot
# Trigger via CI on a tag:
#   git tag -a v0.2.0 -m "Release v0.2.0"
#   git push origin v0.2.0
#
version: 2

project_name: gofly

env:
  - CGO_ENABLED=0
  - GOTOOLCHAIN=local

before:
  hooks:
    - sh bin/scripts/check-mod-tidy.sh

builds:
  - id: gofly-cli
    main: ./cmd/gofly
    binary: gofly
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    goarm: []
    ignore:
      - goos: windows
        goarch: arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X 'github.com/gofly/gofly/cmd/gofly/internal/command.Version={{ .Version }}'
      - -X 'github.com/gofly/gofly/cmd/gofly/internal/command.Commit={{ .Commit }}'
      - -X 'github.com/gofly/gofly/cmd/gofly/internal/command.BuiltAt={{ .Date }}'

archives:
  - id: default
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: checksums.txt
  algorithm: sha256

sboms:
  - id: archive-sbom
    artifacts: archive
    documents:
      - "${artifact}.spdx.json"

dockers:
  - image_templates:
      - "ghcr.io/gofly/gofly:{{ .Version }}-amd64"
      - "ghcr.io/gofly/gofly:latest-amd64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: amd64
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .Commit }}"
      - "--build-arg=BUILT_AT={{ .Date }}"
  - image_templates:
      - "ghcr.io/gofly/gofly:{{ .Version }}-arm64"
      - "ghcr.io/gofly/gofly:latest-arm64"
    dockerfile: Dockerfile
    use: buildx
    goos: linux
    goarch: arm64
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--build-arg=VERSION={{ .Version }}"
      - "--build-arg=COMMIT={{ .Commit }}"
      - "--build-arg=BUILT_AT={{ .Date }}"

docker_manifests:
  - name_template: "ghcr.io/gofly/gofly:{{ .Version }}"
    image_templates:
      - "ghcr.io/gofly/gofly:{{ .Version }}-amd64"
      - "ghcr.io/gofly/gofly:{{ .Version }}-arm64"
  - name_template: "ghcr.io/gofly/gofly:latest"
    image_templates:
      - "ghcr.io/gofly/gofly:latest-amd64"
      - "ghcr.io/gofly/gofly:latest-arm64"

brews:
  - name: gofly
    repository:
      owner: gofly
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/gofly/gofly"
    description: "AI-native Go microservice framework and code-generation CLI"
    license: "MIT"
    test: |
      system "#{bin}/gofly", "version"
    install: |
      bin.install "gofly"

snapshot:
  version_template: "{{ incpatch .Version }}-next.{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"
      - "Merge branch"
      - "Merge pull request"
  groups:
    - title: Features
      regexp: "^(feat|feature)\\(?.+\\)?!?:"
      order: 0
    - title: Fixes
      regexp: "^fix\\(?.+\\)?!?:"
      order: 1
    - title: Performance
      regexp: "^perf\\(?.+\\)?!?:"
      order: 2
    - title: Breaking
      regexp: "^.*!:"
      order: 3
    - title: Others
      order: 999

release:
  github:
    owner: gofly
    name: gofly
  draft: false
  prerelease: auto
