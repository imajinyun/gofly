apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gofly-app
  labels:
    app.kubernetes.io/name: gofly-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gofly-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
