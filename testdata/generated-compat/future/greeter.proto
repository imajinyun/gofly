syntax = "proto3";

package compat.v2;

option go_package = "example.com/orders/gen/compatv2";

service Greeter {
  rpc SayHello(HelloRequest) returns (HelloResponse);
  rpc WatchHello(HelloRequest) returns (stream HelloResponse);
  rpc Chat(stream ChatMessage) returns (stream ChatMessage);
}

message HelloRequest {
  string name = 1;
  string locale = 2;
}

message HelloResponse {
  string message = 1;
  string trace_id = 2;
}

message ChatMessage {
  string sender = 1;
  string body = 2;
}
